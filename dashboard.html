<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Hunt — Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h2>Treasure Hunt</h2>
            <div class="user-info">
                <span id="usernameDisplay"></span>
                <span id="scoreDisplay">0 pts</span>
            </div>
            <button id="logoutButton" class="btn-secondary">Logout</button>
        </div>
    </header>

    <div class="container">
        <div id="loadingState" class="game-card">
            <p style="text-align:center; color:var(--fg-3); margin:0">Loading your next challenge…</p>
        </div>

        <div id="gameState" class="game-card" style="display: none;">
            <div class="checkpoint-header">
                <div class="checkpoint-meta">
                    <span id="difficultyPill" class="diff-pill diff-pill--easy">Easy</span>
                    <span id="pointsPill" class="points-pill">+10 pts</span>
                </div>
                <h3>Challenge <span id="challengeNumber"></span> of 4</h3>
                <p id="checkpointPuzzle" class="puzzle-text"></p>
                <div id="trail" class="trail"></div>
            </div>
            <div class="checkpoint-actions">
                <div class="input-group">
                    <label for="secretCodeInput">Enter Secret Code</label>
                    <input type="text" id="secretCodeInput" placeholder="Found a code? Enter it here…">
                </div>
                <button id="submitCodeButton" class="btn-primary">Submit Code</button>
            </div>
            <div class="support-actions">
                <button id="hintButton" class="btn-secondary">Get a Hint</button>
                <button id="skipButton" class="btn-danger">Skip Checkpoint</button>
            </div>
        </div>

        <div id="finishedState" class="game-card" style="display: none;">
            <span id="finalScore"></span>
            <p>Final Score</p>
        </div>
    </div>

    <div id="modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalMessage"></p>
            <button id="modalCloseButton" class="btn-primary">Close</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sfvnssyrmikyyyewwdkw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmdm5zc3lybWlreXl5ZXd3ZGt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQxNjI3NjksImV4cCI6MjA2OTczODc2OX0.SqPgb7f_iU7uVj1IW5AVJWo2qHsPLPXMiXMy9g88JgQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loadingState = document.getElementById('loadingState');
        const gameState = document.getElementById('gameState');
        const finishedState = document.getElementById('finishedState');
        const usernameDisplay = document.getElementById('usernameDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const challengeNumber = document.getElementById('challengeNumber');
        const checkpointPuzzle = document.getElementById('checkpointPuzzle');
        const difficultyPill = document.getElementById('difficultyPill');
        const pointsPill = document.getElementById('pointsPill');
        const trailEl = document.getElementById('trail');

        function renderTrail(completedCount, total) {
            const parts = [];
            for (let i = 0; i < total; i++) {
                const cls = i < completedCount ? 'done' : (i === completedCount ? 'active' : '');
                parts.push(`<span class="trail__step ${cls}"></span>`);
                if (i < total - 1) {
                    parts.push(`<span class="trail__link ${i < completedCount ? 'done' : ''}"></span>`);
                }
            }
            trailEl.innerHTML = parts.join('');
        }
        function setDifficulty(level) {
            difficultyPill.className = `diff-pill diff-pill--${level}`;
            difficultyPill.textContent = level.charAt(0).toUpperCase() + level.slice(1);
        }
        function setPoints(points) {
            pointsPill.textContent = `+${points} pts`;
        }
        function animateScoreTo(target) {
            const start = parseInt(scoreDisplay.dataset.value || '0', 10);
            const duration = 600;
            const t0 = performance.now();
            scoreDisplay.classList.remove('bump','flash');
            void scoreDisplay.offsetWidth;
            scoreDisplay.classList.add('bump','flash');
            function tick(now) {
                const p = Math.min(1, (now - t0) / duration);
                const eased = 1 - Math.pow(1 - p, 3);
                const value = Math.round(start + (target - start) * eased);
                scoreDisplay.textContent = `${value} pts`;
                if (p < 1) requestAnimationFrame(tick);
                else scoreDisplay.dataset.value = String(target);
            }
            requestAnimationFrame(tick);
        }

        const secretCodeInput = document.getElementById('secretCodeInput');
        const submitCodeButton = document.getElementById('submitCodeButton');
        const hintButton = document.getElementById('hintButton');
        const skipButton = document.getElementById('skipButton');
        const finalScore = document.getElementById('finalScore');
        const logoutButton = document.getElementById('logoutButton');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalCloseButton = document.getElementById('modalCloseButton');

        let currentUser = null;
        let userProfile = null;
        let currentCheckpoint = null;
        const GAME_DIFFICULTY_PROGRESSION = ['easy', 'medium', 'hard', 'medium'];

        function showModal(title, message) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modal.style.display = 'flex';
            setTimeout(() => modalCloseButton.focus(), 100);
        }
        modalCloseButton.addEventListener('click', () => modal.style.display = 'none');
        document.addEventListener('keydown', (e) => {
            if (modal.style.display === 'flex' && (e.key === 'Escape' || e.key === 'Esc')) modal.style.display = 'none';
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (error || !session) { window.location.href = 'index.html'; return; }
            currentUser = session.user;
            await fetchUserProfileAndInit();
        });

        async function fetchUserProfileAndInit() {
            const { data, error } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            if (error) { showModal('Error', 'Could not load your profile. Please try logging in again.'); return; }
            userProfile = data;
            usernameDisplay.textContent = userProfile.username;
            scoreDisplay.dataset.value = String(userProfile.total_score);
            scoreDisplay.textContent = `${userProfile.total_score} pts`;
            await fetchCurrentGameState();
        }

        async function fetchCurrentGameState() {
            loadingState.style.display = 'block';
            gameState.style.display = 'none';
            const { data: completedCheckpoints, error: completedError } = await supabase
                .from('progress').select('checkpoint_id').eq('user_id', currentUser.id);
            if (completedError) { showModal('Database Error', 'Could not fetch your progress.'); return; }

            const completedCount = completedCheckpoints.length;
            const completedCheckpointIds = completedCheckpoints.map(p => p.checkpoint_id);

            if (completedCount >= GAME_DIFFICULTY_PROGRESSION.length) {
                loadingState.style.display = 'none';
                gameState.style.display = 'none';
                finishedState.style.display = 'block';
                finalScore.textContent = userProfile.total_score;
                return;
            }

            const currentDifficulty = GAME_DIFFICULTY_PROGRESSION[completedCount];
            const { data: availableCheckpoints, error: availableError } = await supabase
                .from('checkpoints').select('*').eq('difficulty', currentDifficulty)
                .not('id', 'in', `(${completedCheckpointIds.join(',') || 0})`);
            if (availableError) { showModal('Database Error', 'Could not fetch new questions.'); return; }
            if (availableCheckpoints.length === 0) {
                showModal('Game Error', `Apologies! We've run out of '${currentDifficulty}' questions. Please contact the admin.`);
                loadingState.style.display = 'none'; return;
            }
            currentCheckpoint = availableCheckpoints[Math.floor(Math.random() * availableCheckpoints.length)];

            loadingState.style.display = 'none';
            gameState.style.display = 'block';
            challengeNumber.textContent = completedCount + 1;
            checkpointPuzzle.textContent = currentCheckpoint.puzzle;
            setDifficulty(currentDifficulty);
            setPoints(currentCheckpoint.base_points);
            renderTrail(completedCount, GAME_DIFFICULTY_PROGRESSION.length);
        }

        async function completeCheckpoint(pointsEarned, wasSkipped = false) {
            try {
                const newTotalScore = Math.max(0, userProfile.total_score + pointsEarned);
                const { error: progressError } = await supabase.from('progress').insert({
                    user_id: currentUser.id, checkpoint_id: currentCheckpoint.id, status: 'completed',
                    score: wasSkipped ? 0 : currentCheckpoint.base_points,
                    completed_at: new Date().toISOString(),
                    hint_used: wasSkipped ? false : (pointsEarned < currentCheckpoint.base_points)
                });
                if (progressError) throw progressError;
                const { error: profileError } = await supabase.from('profiles').update({ total_score: newTotalScore }).eq('id', currentUser.id);
                if (profileError) throw profileError;
                userProfile.total_score = newTotalScore;
                animateScoreTo(newTotalScore);
                secretCodeInput.value = '';
                await fetchCurrentGameState();
            } catch (error) {
                showModal('Error', `There was a problem saving your progress: ${error.message}`);
            }
        }

        submitCodeButton.addEventListener('click', async () => {
            const enteredCode = secretCodeInput.value.trim().toUpperCase();
            if (!enteredCode) { showModal('Invalid Input', 'Please enter a code.'); return; }
            if (enteredCode === currentCheckpoint.secret_code.toUpperCase()) {
                showModal('Success!', `Correct! You earned ${currentCheckpoint.base_points} points.`);
                await completeCheckpoint(currentCheckpoint.base_points);
            } else {
                showModal('Incorrect', 'That code is not correct. Please try again.');
                secretCodeInput.value = '';
            }
        });

        hintButton.addEventListener('click', async () => {
            const penalty = currentCheckpoint.hint_penalty;
            const newScore = Math.max(0, userProfile.total_score - penalty);
            const { error } = await supabase.from('profiles').update({ total_score: newScore }).eq('id', currentUser.id);
            if (error) { showModal('Error', 'Could not apply penalty. Please try again.'); return; }
            userProfile.total_score = newScore;
            animateScoreTo(newScore);
            showModal('Hint', `Here is a hint (penalty: ${penalty} points): ${currentCheckpoint.hint}`);
        });

        skipButton.addEventListener('click', async () => {
            const penalty = currentCheckpoint.skip_penalty * -1;
            showModal('Checkpoint Skipped', `You skipped the checkpoint. Penalty: ${currentCheckpoint.skip_penalty} points.`);
            await completeCheckpoint(penalty, true);
        });

        logoutButton.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
