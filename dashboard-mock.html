<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Hunt — Dashboard (mock)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h2>Treasure Hunt</h2>
            <div class="user-info">
                <span>cartographer42</span>
                <span id="scoreDisplay" data-value="120">120 pts</span>
            </div>
            <button class="btn-secondary" id="logoutButton">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="game-card">
            <div class="checkpoint-header">
                <div class="checkpoint-meta">
                    <span class="diff-pill diff-pill--medium">Medium</span>
                    <span class="points-pill">+20 pts</span>
                </div>
                <h3>Challenge 2 of 4</h3>
                <p class="puzzle-text">I have cities, but no houses. I have mountains, but no trees. I have water, but no fish. I have roads, but no cars. What am I?</p>
                <div class="trail">
                    <span class="trail__step done"></span>
                    <span class="trail__link done"></span>
                    <span class="trail__step active"></span>
                    <span class="trail__link"></span>
                    <span class="trail__step"></span>
                    <span class="trail__link"></span>
                    <span class="trail__step"></span>
                </div>
            </div>
            <div class="checkpoint-actions">
                <div class="input-group">
                    <label for="secretCodeInput">Enter Secret Code</label>
                    <input type="text" id="secretCodeInput" placeholder="Found a code? Enter it here…" value="MAP">
                </div>
                <button class="btn-primary" id="demoBump">Submit Code</button>
            </div>
            <div class="support-actions">
                <button class="btn-secondary">Get a Hint</button>
                <button class="btn-danger">Skip Checkpoint</button>
            </div>
        </div>
    </div>
<script>
  // demo: clicking Submit triggers the score animation so reviewers can see it
  const score = document.getElementById('scoreDisplay');
  document.getElementById('demoBump').addEventListener('click', (e) => {
    e.preventDefault();
    const target = parseInt(score.dataset.value, 10) + 20;
    const start = parseInt(score.dataset.value, 10);
    const t0 = performance.now();
    score.classList.remove('bump','flash'); void score.offsetWidth;
    score.classList.add('bump','flash');
    (function tick(now) {
      const p = Math.min(1, (now - t0)/600);
      const eased = 1 - Math.pow(1-p, 3);
      const v = Math.round(start + (target-start)*eased);
      score.textContent = `${v} pts`;
      if (p<1) requestAnimationFrame(tick); else score.dataset.value = String(target);
    })(performance.now());
  });
</script>
</body>
</html>
